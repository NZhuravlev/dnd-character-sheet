<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Студент Призмари</title>
    <link rel="stylesheet" href="./styles.css?v=20260607-ability-width" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-identity">
          <p class="eyebrow">UA Mystic 2017</p>
          <h1 id="hero-name">Загрузка...</h1>
          <p id="hero-subtitle" class="hero-subtitle"></p>
        </div>
        <div class="hero-stats">
          <div id="hero-tags" class="tag-row hero-tag-row"></div>
        </div>
        <div class="hero-actions">
          <button class="action-trigger" type="button" data-action-type="action" onclick="window.__openActions?.('action')">Действие</button>
          <button class="action-trigger" type="button" data-action-type="bonus" onclick="window.__openActions?.('bonus')">Бонусное действие</button>
          <button class="action-trigger" type="button" data-action-type="reaction" onclick="window.__openActions?.('reaction')">Реакция</button>
          <button class="action-trigger" type="button" data-action-type="special" onclick="window.__openActions?.('special')">Особое</button>
        </div>
      </header>

      <main class="layout">
        <section class="primary-column">
          <section class="panel">
            <div id="abilities-grid" class="abilities-sheet"></div>
          </section>

          <details class="panel collapsible">
            <summary>Дисциплины</summary>
            <div id="disciplines-list" class="stack-list"></div>
          </details>

          <details class="panel collapsible">
            <summary>Таланты</summary>
            <div id="talents-list" class="stack-list"></div>
          </details>

          <details class="panel collapsible">
            <summary>Заклинания</summary>
            <div id="spells-list" class="stack-list"></div>
          </details>

          <details class="panel collapsible">
            <summary>Особенности</summary>
            <div id="features-list" class="stack-list"></div>
          </details>

          <details class="panel collapsible">
            <summary>Черты</summary>
            <div id="feats-list" class="stack-list"></div>
          </details>

          <details class="panel collapsible">
            <summary>Снаряжение и деньги</summary>
            <div id="items-list" class="stack-list"></div>
            <div id="equipment-list" class="plain-list"></div>
            <div id="currency-box" class="currency-box"></div>
          </details>
        </section>

        <aside class="secondary-column">
          <section class="panel state-panel">
            <div class="section-heading">
              <h2>Состояние боя</h2>
              <p>Сохраняется локально в этом браузере.</p>
            </div>

            <div class="state-block">
              <label class="field-label" for="hp-adjustment">Хиты</label>
              <div class="hp-line">
                <span id="hp-summary" class="pill large"></span>
                <span id="temp-hp-summary" class="pill subtle hidden"></span>
                <span id="concentration-dc" class="pill subtle hidden"></span>
              </div>
              <div class="inline-controls health-row health-row-dual">
                <input id="hp-adjustment" class="health-input" type="number" inputmode="numeric" placeholder="HP" />
                <button id="damage-button" class="small-button danger compact-health-button" type="button" aria-label="Нанести урон">-HP</button>
                <button id="heal-button" class="small-button compact-health-button" type="button" aria-label="Вылечить">+HP</button>
              </div>
              <div class="inline-controls health-row health-row-single">
                <input id="temp-hp-input" class="health-input" type="number" inputmode="numeric" min="0" placeholder="Temp HP" />
                <button id="temp-hp-button" class="small-button ghost compact-health-button" type="button" aria-label="Задать временные хиты">Temp</button>
              </div>
              <div class="inline-controls health-row health-row-single">
                <input id="max-hp-adjustment" class="health-input" type="number" inputmode="numeric" placeholder="Max HP ±" />
                <button id="max-hp-button" class="small-button ghost compact-health-button" type="button" aria-label="Изменить максимум хитов">Max</button>
              </div>
            </div>

            <div class="state-block">
              <label class="field-label" for="psi-input">Ресурсы</label>
              <div class="resource-editor">
                <label>Пси-очки <input id="psi-input" type="number" min="0" /></label>
                <label>Кости хитов <input id="hit-dice-input" type="number" min="0" /></label>
                <label>Lucky <input id="lucky-input" type="number" min="0" max="3" /></label>
                <label>Psionic Mastery <input id="mastery-input" type="number" min="0" /></label>
              </div>
            </div>

            <div id="spell-slots-block" class="state-block hidden">
              <span class="field-label">Ячейки заклинаний</span>
              <div id="spell-slots-editor" class="spell-slot-list"></div>
            </div>

            <div class="state-block">
              <label class="field-label" for="focus-select">Психофокус</label>
              <select id="focus-select"></select>
              <div id="focus-summary" class="note-box"></div>
            </div>

            <div class="state-block">
              <label class="field-label" for="concentration-name">Концентрация</label>
              <div class="inline-controls">
                <label class="toggle">
                  <input id="concentration-active" type="checkbox" />
                  <span>Активна</span>
                </label>
                <input id="concentration-name" type="text" placeholder="На чем концентрируешься" />
              </div>
            </div>

            <div class="state-block">
              <label class="field-label" for="effect-select">Эффекты</label>
              <div class="inline-controls">
                <select id="effect-select"></select>
                <button id="add-effect-button" class="small-button">Добавить</button>
              </div>
              <div id="active-effects" class="chip-list"></div>
            </div>

            <div class="state-block">
              <span class="field-label">Состояния</span>
              <div id="conditions-grid" class="conditions-grid"></div>
            </div>

            <div class="state-block">
              <label class="field-label" for="combat-notes">Заметки</label>
              <textarea id="combat-notes" rows="5" placeholder="Раунд, цели, траты пси, важные эффекты..."></textarea>
            </div>

            <div class="state-block reset-row">
              <button id="reset-state-button" class="small-button ghost">Сбросить боевое состояние</button>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <div id="actions-modal" class="actions-modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <div>
            <p class="eyebrow" id="modal-type-label"></p>
            <h2 id="modal-title">Действия</h2>
          </div>
          <button id="close-modal-button" class="icon-button" type="button" aria-label="Закрыть">✕</button>
        </div>
        <div class="modal-search-row">
          <input id="modal-search-input" type="search" placeholder="Поиск: концентрация, спасбросок, урон..." />
        </div>
        <div id="modal-feedback" class="modal-feedback hidden"></div>
        <div id="modal-actions-list" class="modal-actions-list"></div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
